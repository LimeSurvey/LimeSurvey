name: Codespell - Spelling Check

# Run on PRs against the long-lived branches and on direct pushes to them.
on:
  pull_request:
    branches:
      - master
      - develop-major
      - develop-minor
  push:
    branches:
      - master
      - develop-major
      - develop-minor

permissions:
  contents: read
  pull-requests: write

jobs:
  codespell:
    runs-on: ubuntu-22.04
    name: Check for spelling errors
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run codespell
        uses: codespell-project/actions-codespell@master
